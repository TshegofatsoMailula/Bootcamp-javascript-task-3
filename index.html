<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script type="module" src="/assets/js/async.js" defer></script>
</head>
<body>
<header>

</header>
<main>
<section>
    <form id="form-wrapper" method="POST">
        <div>
            <label>Username</label>
            <input type="text" id="username" name="username">
            <span id="username-error"></span>
        </div>
        <div>
            <label>Email address</label>
            <input type="email" id="email-address" name="email-address">
            <span id="email-address-error"></span>
        </div>
        <div>
            <label>Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password">
            <span id="password-error"></span>
        </div>
        <div>
            <label>Confirm password</label>
            <input type="password" id="password-confirmation" name="password-confirmation" autocomplete="new-password">
            <span id="password-confirmation-error"></span>
        </div>
        <div>

        </div>
        <div>
            <button type="submit">Sign up</button>
        </div>
    </form>
</section>
</main>
<footer>

</footer>
</body>
</html>
